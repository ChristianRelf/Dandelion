appId: browser.dandelion.app
productName: Dandelion
copyright: Copyright © 2026 Christian Relf

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json
  - '!**/*.map'

# Native modules must remain unpacked so Electron can dlopen the .node binary.
asarUnpack:
  - '**/*.node'
  - node_modules/better-sqlite3/**

# electron-updater feed. GitHub Releases is the only distribution channel that
# exists today; a generic feed needs a server to point at.
publish:
  provider: github
  owner: ChristianRelf
  repo: Dandelion

# x64 only: better-sqlite3 ships no win32-arm64 prebuild, so an arm64 target
# compiles it from source and needs the ARM64 MSVC toolset — which fails on a
# stock runner. Windows on ARM runs the x64 build under emulation, so nobody is
# shut out; a native arm64 build wants a prebuilt binary for better-sqlite3.
win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false

linux:
  category: Network
  target:
    - AppImage
    - deb
  maintainer: Christian Relf <christianjamesrelf@gmail.com>
