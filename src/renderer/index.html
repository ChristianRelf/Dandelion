<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      This is the whole policy, and nothing intersects it at runtime: the chrome
      is served over file:// via `loadFile`, where `webRequest` header injection
      does not fire, so a response-header pass could not tighten it. The token is
      resolved at build time instead — `chromeCsp` in electron.vite.config.ts
      emits 'unsafe-inline'/'unsafe-eval' in `script-src` for the dev server,
      which injects Vite's HMR client inline, and neither for production.

      `img-src` keeps https: only for the reader's inline images, which are still
      fetched by the chrome and so still land in the default session. Favicons no
      longer need it — they load over dandelion-favicon:, which main resolves
      through the owning profile's session. Routing the reader's images the same
      way is what lets https: come out of this list; see Work/BUGS.md.
    -->
    <meta http-equiv="Content-Security-Policy" content="__DANDELION_CSP__" />
    <title>Dandelion</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
