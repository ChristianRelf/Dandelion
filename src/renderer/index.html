<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      This is the whole policy. Nothing intersects it at runtime: the chrome is
      served over file:// via `loadFile`, where `webRequest` header injection
      does not fire, so a response-header pass could not tighten it even if one
      existed. `script-src` still carries 'unsafe-inline' and 'unsafe-eval'; that
      is recorded in Work/BUGS.md and wants a build-time dev/prod split, not a
      comment claiming one already happened.

      `img-src` keeps https: only for the reader's inline images, which are still
      fetched by the chrome and so still land in the default session. Favicons no
      longer need it — they load over dandelion-favicon:, which main resolves
      through the owning profile's session. Routing the reader's images the same
      way is what lets https: come out of this list; see Work/BUGS.md.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob: https: dandelion-favicon:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; font-src 'self' data:; connect-src 'self' ws: wss: http: https:;"
    />
    <title>Dandelion</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
